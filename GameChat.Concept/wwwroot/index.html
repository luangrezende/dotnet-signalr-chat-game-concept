<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameChat Concept</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/game.css" />
    <!-- Module CSS (chat, games) is injected dynamically by app.js -->
</head>
<body>

    <!-- ===== Name modal (first visit) ===== -->
    <div id="name-modal" class="name-modal hidden">
        <div class="name-modal-box">
            <div class="name-modal-icon">🎮</div>
            <h2>Bem-vindo ao GameChat!</h2>
            <p>Como quer ser chamado?</p>
            <input id="name-modal-input" type="text" maxlength="20"
                   placeholder="Seu nome..." autocomplete="off" />
            <button id="name-modal-btn" disabled>Entrar</button>
        </div>
    </div>

    <div class="app-container">

        <header class="app-header">
            <span class="app-title">GameChat Concept</span>
        </header>

        <div class="app-body">
            <div class="games-panel">
                <nav class="game-tabs"></nav>
                <div class="game-content"></div>
            </div>

            <div class="chat-panel"></div>
        </div>
    </div>

    <!-- SignalR client (global, consumed by chat module) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

    <!-- App entry point (ES module) -->
    <script src="/js/app.js" type="module"></script>
</body>
</html>
