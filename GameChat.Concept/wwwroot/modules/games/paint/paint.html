<div id="draw-wrap" class="draw-wrap">
    <div class="draw-toolbar">
        <input type="color" id="draw-color" class="draw-color-input" value="#cdd6f4" title="Cor">
        <input type="range" id="draw-size" class="draw-size-range" min="2" max="40" value="6" title="Espessura">
        <button id="draw-tool-eraser" class="draw-tool-btn" title="Borracha">&#x1F9F9;</button>
        <span id="draw-online-count" class="draw-online-badge hidden"></span>
        <button id="draw-clear-btn" class="draw-action-btn draw-action-btn--end" title="Limpar">Limpar</button>
    </div>
    <div class="draw-canvas-wrap">
        <canvas id="draw-canvas"></canvas>
    </div>
</div>
