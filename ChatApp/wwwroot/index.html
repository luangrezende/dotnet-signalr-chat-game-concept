<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Chat SignalR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1e1e2e; color: #cdd6f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 480px; background: #181825; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { background: #313244; padding: 16px 20px; font-size: 1.1rem; letter-spacing: 1px; }
        #messages { height: 360px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #313244; border-radius: 8px; padding: 8px 12px; max-width: 90%; word-break: break-word; }
        .msg .user { font-weight: bold; color: #cba6f7; font-size: 0.8rem; margin-bottom: 2px; }
        .msg.mine { align-self: flex-end; background: #45475a; }
        .msg.mine .user { color: #a6e3a1; }
        .input-area { display: flex; gap: 8px; padding: 12px; background: #313244; }
        input { flex: 1; padding: 10px 12px; border-radius: 8px; border: none; background: #45475a; color: #cdd6f4; font-size: 0.95rem; outline: none; }
        button { padding: 10px 18px; border: none; border-radius: 8px; background: #cba6f7; color: #1e1e2e; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #b4befe; }
        button:disabled { background: #585b70; cursor: default; }
        .status { font-size: 0.75rem; padding: 4px 20px 8px; color: #6c7086; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>💬 Chat SignalR</h2>
        <div id="messages"></div>
        <div class="status" id="status">Conectando...</div>
        <div class="input-area">
            <input id="userInput" type="text" placeholder="Seu nome" style="max-width:120px" />
            <input id="messageInput" type="text" placeholder="Mensagem..." />
            <button id="sendBtn" disabled>Enviar</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/chathub")
            .withAutomaticReconnect()
            .build();

        const messagesDiv = document.getElementById("messages");
        const statusDiv = document.getElementById("status");
        const sendBtn = document.getElementById("sendBtn");
        const userInput = document.getElementById("userInput");
        const messageInput = document.getElementById("messageInput");

        const myName = () => userInput.value.trim() || "Anônimo";

        connection.on("ReceiveMessage", (user, message) => {
            const div = document.createElement("div");
            div.classList.add("msg");
            if (user === myName()) div.classList.add("mine");
            div.innerHTML = `<div class="user">${escapeHtml(user)}</div><div>${escapeHtml(message)}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        connection.onreconnecting(() => {
            statusDiv.textContent = "Reconectando...";
            sendBtn.disabled = true;
        });

        connection.onreconnected(() => {
            statusDiv.textContent = "Conectado";
            sendBtn.disabled = false;
        });

        connection.onclose(() => {
            statusDiv.textContent = "Desconectado";
            sendBtn.disabled = true;
        });

        connection.start()
            .then(() => {
                statusDiv.textContent = "Conectado";
                sendBtn.disabled = false;
            })
            .catch(err => {
                statusDiv.textContent = "Falha ao conectar: " + err;
            });

        async function send() {
            const message = messageInput.value.trim();
            if (!message) return;
            await connection.invoke("SendMessage", myName(), message);
            messageInput.value = "";
            messageInput.focus();
        }

        sendBtn.addEventListener("click", send);
        messageInput.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

        function escapeHtml(str) {
            return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }
    </script>
</body>
</html>
