<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameChat Concept</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/chat.css" />
    <link rel="stylesheet" href="/css/game.css" />
</head>
<body>
    <div class="app-container">

        <header class="app-header">
            <span class="app-title">🎮 GameChat Concept</span>
            <nav class="tabs">
                <button class="tab-btn" data-tab="chat">💬 Chat</button>
                <button class="tab-btn" data-tab="pingpong">🏓 Ping Pong</button>
            </nav>
        </header>

        <main>

            <!-- Chat Module -->
            <section id="tab-chat" class="tab-panel">
                <div class="chat-container">
                    <div id="messages"></div>
                    <div class="chat-status" id="chat-status">Conectando...</div>
                    <div class="input-area">
                        <input id="userInput" type="text" class="name-input" placeholder="Seu nome" />
                        <input id="messageInput" type="text" placeholder="Mensagem..." />
                        <button id="sendBtn" disabled>Enviar</button>
                    </div>
                </div>
            </section>

            <!-- Ping Pong Module -->
            <section id="tab-pingpong" class="tab-panel">

                <!-- Lobby / Join Screen -->
                <div id="pingpong-lobby" class="pp-setup">
                    <span class="pp-setup-icon">🏓</span>
                    <h2>Ping Pong</h2>
                    <p class="pp-subtitle">Multiplayer online — 2 jogadores</p>
                    <div class="pp-join-form">
                        <input id="pp-join-name" type="text" maxlength="16" placeholder="Seu nome" autocomplete="off" />
                        <button id="pp-join-btn" class="pp-btn" disabled>Entrar na partida</button>
                    </div>
                    <p id="pp-lobby-status" class="pp-lobby-status"></p>
                </div>

                <!-- Game Screen -->
                <div id="pingpong-game" class="pp-game hidden">
                    <div class="pp-scoreboard">
                        <div class="pp-score-side">
                            <span id="pp-name-display1" class="pp-player-name">Jogador 1</span>
                            <span id="pp-score1" class="pp-score">0</span>
                        </div>
                        <div class="pp-score-divider">:</div>
                        <div class="pp-score-side pp-score-side--right">
                            <span id="pp-score2" class="pp-score">0</span>
                            <span id="pp-name-display2" class="pp-player-name">Jogador 2</span>
                        </div>
                    </div>
                    <div class="pp-canvas-wrap">
                        <canvas id="pp-canvas"></canvas>
                        <!-- Win overlay (inside canvas wrap) -->
                        <div id="pingpong-result" class="pp-result hidden">
                            <div class="pp-result-box">
                                <h2 id="pp-winner-text">Jogador 1 venceu!</h2>
                                <button id="pp-play-again-btn" class="pp-btn">Jogar Novamente</button>
                                <button id="pp-new-names-btn" class="pp-btn pp-btn--secondary">Voltar ao Lobby</button>
                            </div>
                        </div>
                    </div>
                    <p id="pp-controls-hint" class="pp-controls-hint"></p>
                </div>

            </section>

        </main>
    </div>

    <!-- SignalR client (global, consumed by chat module) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

    <!-- App entry point (ES module) -->
    <script src="/js/app.js" type="module"></script>
</body>
</html>
